<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>贪吃蛇大作战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #e0e0ff;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    height: 100vh;
    width: 100vw;
  }
  #gameCanvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }
  .overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10, 10, 26, 0.92);
    z-index: 10;
    transition: opacity 0.3s;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 2.2em;
    background: linear-gradient(90deg, #00ff88, #00ccff, #ff66cc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.3em;
  }
  .overlay h2 {
    font-size: 1.5em;
    color: #ff4466;
    margin-bottom: 0.5em;
  }
  .overlay p {
    color: #8888aa;
    margin-bottom: 0.4em;
    font-size: 0.95em;
    text-align: center;
    max-width: 320px;
    line-height: 1.5;
  }
  .overlay .score-display {
    font-size: 2em;
    color: #00ff88;
    margin: 0.3em 0;
  }
  .btn {
    margin-top: 1em;
    padding: 14px 48px;
    font-size: 1.15em;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: linear-gradient(135deg, #00ff88, #00ccff);
    color: #0a0a1a;
    font-weight: bold;
    letter-spacing: 1px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:active { transform: scale(0.95); }
  .btn:hover { box-shadow: 0 0 20px rgba(0,255,136,0.4); }
  .leaderboard {
    margin-top: 1em;
    width: 280px;
    max-height: 200px;
    overflow-y: auto;
  }
  .leaderboard h3 {
    font-size: 1em;
    color: #ffcc00;
    margin-bottom: 0.4em;
    text-align: center;
  }
  .leaderboard table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85em;
  }
  .leaderboard th {
    color: #8888aa;
    padding: 3px 6px;
    border-bottom: 1px solid #333;
    text-align: left;
  }
  .leaderboard td {
    padding: 3px 6px;
    border-bottom: 1px solid #1a1a2e;
  }
  .leaderboard .rank-1 { color: #ffd700; }
  .leaderboard .rank-2 { color: #c0c0c0; }
  .leaderboard .rank-3 { color: #cd7f32; }
  .weekly-champions {
    margin-top: 0.8em;
    width: 280px;
  }
  .weekly-champions h3 {
    font-size: 0.9em;
    color: #ff66cc;
    margin-bottom: 0.3em;
    text-align: center;
  }
  .weekly-champions p {
    font-size: 0.8em;
    color: #7777aa;
    margin: 0.15em 0;
    text-align: center;
  }
  #hud {
    position: fixed;
    top: 8px; left: 8px; right: 8px;
    display: flex;
    justify-content: space-between;
    z-index: 5;
    pointer-events: none;
    font-size: 0.9em;
  }
  #hud span {
    background: rgba(10,10,26,0.7);
    padding: 4px 10px;
    border-radius: 12px;
  }
  .hud-score { color: #00ff88; }
  .hud-length { color: #00ccff; }
  .hud-time { color: #ffcc00; }
  #pauseBtn {
    position: fixed;
    top: 8px; right: 8px;
    z-index: 6;
    background: rgba(10,10,26,0.7);
    color: #aaa;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 0.85em;
    cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud" class="hidden">
  <span class="hud-score" id="hudScore">得分: 0</span>
  <span class="hud-length" id="hudLength">长度: 3</span>
  <span class="hud-time" id="hudTime">0s</span>
</div>
<button id="pauseBtn" class="hidden" onclick="togglePause()">暂停</button>

<!-- Start Screen -->
<div id="startScreen" class="overlay">
  <h1>贪吃蛇大作战</h1>
  <p>蛇身每5秒自动增长1单位</p>
  <p>躲避导弹！被击中蛇身+1</p>
  <p>吃掉药片缩短2单位，+10分</p>
  <p>滑动屏幕控制方向</p>
  <button class="btn" onclick="startGame()">开始游戏</button>
  <div class="leaderboard" id="startLeaderboard"></div>
  <div class="weekly-champions" id="startWeeklyChampions"></div>
</div>

<!-- Game Over Screen -->
<div id="gameOverScreen" class="overlay hidden">
  <h2>游戏结束</h2>
  <div class="score-display" id="finalScore">0</div>
  <p id="deathReason"></p>
  <button class="btn" onclick="startGame()">再来一局</button>
  <div class="leaderboard" id="endLeaderboard"></div>
  <div class="weekly-champions" id="endWeeklyChampions"></div>
</div>

<script>
// ============ CONSTANTS ============
const GRID_SIZE = 18;
const AUTO_GROW_INTERVAL = 5000; // ms
const MISSILE_COUNT_RANGE = [2, 4];
const PILL_COUNT_RANGE = [1, 3];
const PILL_LIFETIME = 5000; // ms
const PILL_SHRINK = 2;
const MISSILE_HIT_GROW = 1;
const PILL_SCORE = 10;
const SURVIVAL_SCORE_INTERVAL = 1000; // ms
const MISSILE_SPEED = 1.54;
const SNAKE_SPEED = 169; // ms per move
const DIRECTIONS = {
  UP: { x: 0, y: -1 },
  DOWN: { x: 0, y: 1 },
  LEFT: { x: -1, y: 0 },
  RIGHT: { x: 1, y: 0 }
};

// ============ STATE ============
let canvas, ctx;
let audioCtx = null;
let cols, rows;
let snake = [];
let direction = DIRECTIONS.RIGHT;
let nextDirection = DIRECTIONS.RIGHT;
let missiles = [];
let pills = [];
let particles = []; // visual effects particles
let segmentEffects = []; // { index, color, timer, maxTimer }
let scorePopups = []; // { x, y, text, color, timer, maxTimer }
let score = 0;
let survivalTime = 0;
let gameRunning = false;
let gamePaused = false;
let lastMoveTime = 0;
let lastAutoGrowTime = 0;
let lastSurvivalScoreTime = 0;
let pillSpawnTimer = 0;
let animFrameId = null;
let deathReason = '';
let snakeFlashTimer = 0;

// ============ INIT ============
function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  setupTouchControls();
  setupKeyboardControls();
  renderLeaderboards();
}

// ============ AUDIO (Web Audio API) ============
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playExplosionSound() {
  ensureAudio();
  const ctx = audioCtx;
  const now = ctx.currentTime;

  // Noise burst for explosion - louder and more aggressive
  const bufferSize = ctx.sampleRate * 0.4;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.5);
  }
  const noise = ctx.createBufferSource();
  noise.buffer = buffer;

  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(2000, now);
  filter.frequency.exponentialRampToValueAtTime(150, now + 0.3);

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.6, now);
  gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  noise.start(now);
  noise.stop(now + 0.4);

  // Heavy low boom
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(200, now);
  osc.frequency.exponentialRampToValueAtTime(25, now + 0.3);
  const oscGain = ctx.createGain();
  oscGain.gain.setValueAtTime(0.6, now);
  oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
  osc.connect(oscGain);
  oscGain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.35);

  // Distortion crack
  const crack = ctx.createOscillator();
  crack.type = 'sawtooth';
  crack.frequency.setValueAtTime(300, now);
  crack.frequency.exponentialRampToValueAtTime(50, now + 0.15);
  const crackGain = ctx.createGain();
  crackGain.gain.setValueAtTime(0.25, now);
  crackGain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
  const crackFilter = ctx.createBiquadFilter();
  crackFilter.type = 'bandpass';
  crackFilter.frequency.value = 800;
  crackFilter.Q.value = 2;
  crack.connect(crackFilter);
  crackFilter.connect(crackGain);
  crackGain.connect(ctx.destination);
  crack.start(now);
  crack.stop(now + 0.15);
}

function playHealSound() {
  ensureAudio();
  const ctx = audioCtx;
  const now = ctx.currentTime;

  // Rising chime
  const osc1 = ctx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(523, now);       // C5
  osc1.frequency.setValueAtTime(659, now + 0.1);  // E5
  osc1.frequency.setValueAtTime(784, now + 0.2);  // G5
  const gain1 = ctx.createGain();
  gain1.gain.setValueAtTime(0.3, now);
  gain1.gain.setValueAtTime(0.3, now + 0.15);
  gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
  osc1.connect(gain1);
  gain1.connect(ctx.destination);
  osc1.start(now);
  osc1.stop(now + 0.4);

  // Sparkle
  const osc2 = ctx.createOscillator();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(1047, now + 0.1); // C6
  const gain2 = ctx.createGain();
  gain2.gain.setValueAtTime(0, now);
  gain2.gain.setValueAtTime(0.2, now + 0.1);
  gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
  osc2.connect(gain2);
  gain2.connect(ctx.destination);
  osc2.start(now + 0.1);
  osc2.stop(now + 0.35);
}

// ============ BACKGROUND MUSIC ============
let bgMusicNodes = null;

function startBgMusic() {
  ensureAudio();
  const ctx = audioCtx;

  // Create a quiet, tense ambient loop using oscillators
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.06; // very quiet
  masterGain.connect(ctx.destination);

  // Deep drone
  const drone = ctx.createOscillator();
  drone.type = 'sine';
  drone.frequency.value = 55; // A1

  const droneGain = ctx.createGain();
  droneGain.gain.value = 0.5;

  const droneFilter = ctx.createBiquadFilter();
  droneFilter.type = 'lowpass';
  droneFilter.frequency.value = 200;

  drone.connect(droneFilter);
  droneFilter.connect(droneGain);
  droneGain.connect(masterGain);

  // Slow LFO on drone for pulse
  const lfo = ctx.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 0.15; // very slow
  const lfoGain = ctx.createGain();
  lfoGain.gain.value = 0.3;
  lfo.connect(lfoGain);
  lfoGain.connect(droneGain.gain);

  // Second drone - slight detune for tension
  const drone2 = ctx.createOscillator();
  drone2.type = 'sine';
  drone2.frequency.value = 57; // slightly off for dissonance

  const drone2Gain = ctx.createGain();
  drone2Gain.gain.value = 0.3;

  const drone2Filter = ctx.createBiquadFilter();
  drone2Filter.type = 'lowpass';
  drone2Filter.frequency.value = 180;

  drone2.connect(drone2Filter);
  drone2Filter.connect(drone2Gain);
  drone2Gain.connect(masterGain);

  // High tension tone
  const tension = ctx.createOscillator();
  tension.type = 'triangle';
  tension.frequency.value = 220; // A3

  const tensionGain = ctx.createGain();
  tensionGain.gain.value = 0.15;

  const tensionFilter = ctx.createBiquadFilter();
  tensionFilter.type = 'bandpass';
  tensionFilter.frequency.value = 300;
  tensionFilter.Q.value = 5;

  tension.connect(tensionFilter);
  tensionFilter.connect(tensionGain);
  tensionGain.connect(masterGain);

  // Slow LFO on tension filter for movement
  const lfo2 = ctx.createOscillator();
  lfo2.type = 'sine';
  lfo2.frequency.value = 0.08;
  const lfo2Gain = ctx.createGain();
  lfo2Gain.gain.value = 150;
  lfo2.connect(lfo2Gain);
  lfo2Gain.connect(tensionFilter.frequency);

  // Start all
  drone.start();
  drone2.start();
  tension.start();
  lfo.start();
  lfo2.start();

  bgMusicNodes = { drone, drone2, tension, lfo, lfo2, masterGain };
}

function stopBgMusic() {
  if (bgMusicNodes) {
    try {
      bgMusicNodes.drone.stop();
      bgMusicNodes.drone2.stop();
      bgMusicNodes.tension.stop();
      bgMusicNodes.lfo.stop();
      bgMusicNodes.lfo2.stop();
    } catch(e) {}
    bgMusicNodes = null;
  }
}

// ============ SCORE POPUP ============
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({
    x, y, text, color,
    timer: 45,
    maxTimer: 45
  });
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cols = Math.floor(canvas.width / GRID_SIZE);
  rows = Math.floor(canvas.height / GRID_SIZE);
}

// ============ TOUCH CONTROLS ============
let touchStartX = 0, touchStartY = 0;
function setupTouchControls() {
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (!gameRunning || gamePaused) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const minSwipe = 20;
    if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > 0 && direction !== DIRECTIONS.LEFT) nextDirection = DIRECTIONS.RIGHT;
      else if (dx < 0 && direction !== DIRECTIONS.RIGHT) nextDirection = DIRECTIONS.LEFT;
    } else {
      if (dy > 0 && direction !== DIRECTIONS.UP) nextDirection = DIRECTIONS.DOWN;
      else if (dy < 0 && direction !== DIRECTIONS.DOWN) nextDirection = DIRECTIONS.UP;
    }
  }, { passive: false });
}

// ============ KEYBOARD CONTROLS ============
function setupKeyboardControls() {
  document.addEventListener('keydown', (e) => {
    if (!gameRunning || gamePaused) return;
    switch(e.key) {
      case 'ArrowUp': case 'w': case 'W':
        if (direction !== DIRECTIONS.DOWN) nextDirection = DIRECTIONS.UP; break;
      case 'ArrowDown': case 's': case 'S':
        if (direction !== DIRECTIONS.UP) nextDirection = DIRECTIONS.DOWN; break;
      case 'ArrowLeft': case 'a': case 'A':
        if (direction !== DIRECTIONS.RIGHT) nextDirection = DIRECTIONS.LEFT; break;
      case 'ArrowRight': case 'd': case 'D':
        if (direction !== DIRECTIONS.LEFT) nextDirection = DIRECTIONS.RIGHT; break;
    }
  });
}

// ============ GAME START ============
function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('pauseBtn').classList.remove('hidden');

  resizeCanvas();
  const startX = Math.floor(cols / 2);
  const startY = Math.floor(rows / 2);
  snake = [
    { x: startX, y: startY },
    { x: startX - 1, y: startY },
    { x: startX - 2, y: startY }
  ];
  direction = DIRECTIONS.RIGHT;
  nextDirection = DIRECTIONS.RIGHT;
  missiles = [];
  pills = [];
  particles = [];
  segmentEffects = [];
  scorePopups = [];
  score = 0;
  survivalTime = 0;
  gameRunning = true;
  gamePaused = false;
  deathReason = '';
  lastMoveTime = performance.now();
  lastAutoGrowTime = performance.now();
  lastSurvivalScoreTime = performance.now();
  pillSpawnTimer = 0;

  // Spawn initial missiles
  const mCount = randInt(MISSILE_COUNT_RANGE[0], MISSILE_COUNT_RANGE[1]);
  for (let i = 0; i < mCount; i++) spawnMissile();

  // Spawn initial pills
  spawnPills();

  if (animFrameId) cancelAnimationFrame(animFrameId);
  startBgMusic();
  gameLoop(performance.now());
}

// ============ GAME LOOP ============
function gameLoop(timestamp) {
  if (!gameRunning) return;
  if (gamePaused) {
    animFrameId = requestAnimationFrame(gameLoop);
    return;
  }

  const dt = timestamp - lastMoveTime;

  // Move snake
  if (dt >= SNAKE_SPEED) {
    lastMoveTime = timestamp;
    direction = nextDirection;
    moveSnake();
  }

  // Auto grow
  if (timestamp - lastAutoGrowTime >= AUTO_GROW_INTERVAL) {
    lastAutoGrowTime = timestamp;
    autoGrow();
  }

  // Survival score
  if (timestamp - lastSurvivalScoreTime >= SURVIVAL_SCORE_INTERVAL) {
    lastSurvivalScoreTime = timestamp;
    score += 1;
    survivalTime += 1;
    // Score popup near head
    if (snake.length > 0) {
      const hx = snake[0].x * GRID_SIZE + GRID_SIZE / 2;
      const hy = snake[0].y * GRID_SIZE;
      spawnScorePopup(hx, hy, '+1', '#ffcc00');
    }
  }

  // Update missiles
  updateMissiles();

  // Check missile collision
  checkMissileCollision();

  // Update pills
  updatePills(timestamp);

  // Pill spawn timer
  pillSpawnTimer += 16;
  if (pillSpawnTimer >= 4000) {
    pillSpawnTimer = 0;
    if (pills.length < PILL_COUNT_RANGE[1]) spawnPills();
  }

  // Update particles
  updateParticles();

  // Update segment effects - stronger flash with longer timer
  for (let i = segmentEffects.length - 1; i >= 0; i--) {
    segmentEffects[i].timer--;
    if (segmentEffects[i].timer <= 0) segmentEffects.splice(i, 1);
  }

  // Update score popups
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].y -= 0.8;
    scorePopups[i].timer--;
    if (scorePopups[i].timer <= 0) scorePopups.splice(i, 1);
  }

  // Update HUD
  updateHUD();

  // Draw
  draw(timestamp);

  animFrameId = requestAnimationFrame(gameLoop);
}

// ============ SNAKE MOVEMENT ============
function moveSnake() {
  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  // Wall collision
  if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
    deathReason = '撞墙了！';
    gameOver();
    return;
  }

  // Self collision
  for (let i = 0; i < snake.length; i++) {
    if (head.x === snake[i].x && head.y === snake[i].y) {
      deathReason = '咬到自己了！';
      gameOver();
      return;
    }
  }

  snake.unshift(head);

  // Check pill collision
  let atePill = false;
  for (let i = pills.length - 1; i >= 0; i--) {
    if (head.x === pills[i].x && head.y === pills[i].y) {
      atePill = true;
      score += PILL_SCORE;
      const pillX = pills[i].x * GRID_SIZE + GRID_SIZE / 2;
      const pillY = pills[i].y * GRID_SIZE + GRID_SIZE / 2;
      pills.splice(i, 1);
      // Blue healing effect + sound
      spawnHealEffect(pillX, pillY);
      playHealSound();
      // Score popup
      spawnScorePopup(pillX, pillY - 5, '+10', '#00ccff');
      // Shrink snake
      const shrinkAmount = Math.min(PILL_SHRINK, snake.length - 1);
      if (shrinkAmount > 0) {
        // Flash the remaining tail segments blue (stronger)
        for (let k = 0; k < Math.min(shrinkAmount + 2, snake.length); k++) {
          const idx = snake.length - 1 - k;
          if (idx >= 0) {
            segmentEffects.push({ index: idx, color: 'blue', timer: 30, maxTimer: 30 });
          }
        }
        snake.splice(snake.length - shrinkAmount, shrinkAmount);
      }
      break;
    }
  }

  if (!atePill) {
    snake.pop();
  }
}

function autoGrow() {
  const tail = snake[snake.length - 1];
  snake.push({ x: tail.x, y: tail.y });
  // Flash the new tail segment (stronger)
  segmentEffects.push({ index: snake.length - 1, color: 'grow', timer: 30, maxTimer: 30 });
  // Also flash a couple nearby segments
  if (snake.length > 2) segmentEffects.push({ index: snake.length - 2, color: 'grow', timer: 20, maxTimer: 20 });
}

// ============ MISSILES ============
function spawnMissile() {
  const edge = randInt(0, 3); // 0=top, 1=right, 2=bottom, 3=left
  let x, y, vx, vy;
  const speed = MISSILE_SPEED * (0.7 + Math.random() * 0.6);

  switch(edge) {
    case 0: // top
      x = Math.random() * canvas.width;
      y = -10;
      vx = (Math.random() - 0.5) * speed;
      vy = Math.random() * speed * 0.5 + speed * 0.5;
      break;
    case 1: // right
      x = canvas.width + 10;
      y = Math.random() * canvas.height;
      vx = -(Math.random() * speed * 0.5 + speed * 0.5);
      vy = (Math.random() - 0.5) * speed;
      break;
    case 2: // bottom
      x = Math.random() * canvas.width;
      y = canvas.height + 10;
      vx = (Math.random() - 0.5) * speed;
      vy = -(Math.random() * speed * 0.5 + speed * 0.5);
      break;
    case 3: // left
      x = -10;
      y = Math.random() * canvas.height;
      vx = Math.random() * speed * 0.5 + speed * 0.5;
      vy = (Math.random() - 0.5) * speed;
      break;
  }

  missiles.push({ x, y, vx, vy, trail: [], airflowTimer: 0 });
}

function updateMissiles() {
  for (let i = missiles.length - 1; i >= 0; i--) {
    const m = missiles[i];
    m.trail.push({ x: m.x, y: m.y });
    if (m.trail.length > 14) m.trail.shift();
    m.x += m.vx;
    m.y += m.vy;

    // Spawn airflow particles
    m.airflowTimer++;
    if (m.airflowTimer % 2 === 0) {
      const angle = Math.atan2(-m.vy, -m.vx);
      const spread = (Math.random() - 0.5) * 1.2;
      const speed = 0.3 + Math.random() * 0.5;
      particles.push({
        x: m.x + (Math.random() - 0.5) * 4,
        y: m.y + (Math.random() - 0.5) * 4,
        vx: Math.cos(angle + spread) * speed,
        vy: Math.sin(angle + spread) * speed,
        life: 15 + Math.random() * 10,
        maxLife: 25,
        size: 1.5 + Math.random() * 2,
        type: 'airflow'
      });
    }

    // Remove if off screen
    if (m.x < -50 || m.x > canvas.width + 50 || m.y < -50 || m.y > canvas.height + 50) {
      missiles.splice(i, 1);
      spawnMissile(); // Respawn
    }
  }
}

function checkMissileCollision() {
  for (let i = missiles.length - 1; i >= 0; i--) {
    const m = missiles[i];
    const mGridX = Math.floor(m.x / GRID_SIZE);
    const mGridY = Math.floor(m.y / GRID_SIZE);

    for (let j = 0; j < snake.length; j++) {
      if (snake[j].x === mGridX && snake[j].y === mGridY) {
        // Hit! Red explosion + sound
        spawnExplosion(m.x, m.y);
        playExplosionSound();
        // Add length
        const tail = snake[snake.length - 1];
        for (let k = 0; k < MISSILE_HIT_GROW; k++) {
          snake.push({ x: tail.x, y: tail.y });
          segmentEffects.push({ index: snake.length - 1, color: 'hit', timer: 30, maxTimer: 30 });
        }
        // Flash the hit segment and neighbors (stronger)
        for (let n = Math.max(0, j - 1); n <= Math.min(snake.length - 1, j + 1); n++) {
          segmentEffects.push({ index: n, color: 'hit', timer: 30, maxTimer: 30 });
        }
        // Remove missile and respawn
        missiles.splice(i, 1);
        spawnMissile();
        break;
      }
    }
  }
}

// ============ PILLS ============
function spawnPills() {
  const count = randInt(PILL_COUNT_RANGE[0], PILL_COUNT_RANGE[1]);
  const currentPillCount = pills.length;
  const toSpawn = Math.min(count, PILL_COUNT_RANGE[1] - currentPillCount);

  for (let i = 0; i < toSpawn; i++) {
    let px, py, attempts = 0;
    do {
      px = randInt(1, cols - 2);
      py = randInt(1, rows - 2);
      attempts++;
    } while (isOccupied(px, py) && attempts < 50);

    if (attempts < 50) {
      pills.push({ x: px, y: py, spawnTime: performance.now(), alpha: 1 });
    }
  }
}

function isOccupied(x, y) {
  for (const s of snake) if (s.x === x && s.y === y) return true;
  for (const p of pills) if (p.x === x && p.y === y) return true;
  return false;
}

function updatePills(timestamp) {
  for (let i = pills.length - 1; i >= 0; i--) {
    const p = pills[i];
    const age = timestamp - p.spawnTime;
    if (age >= PILL_LIFETIME) {
      pills.splice(i, 1);
    } else if (age > PILL_LIFETIME - 1500) {
      // Blink in last 1.5s
      p.alpha = Math.sin(age * 0.015) * 0.5 + 0.5;
    }
  }
}

// ============ PARTICLE EFFECTS ============
function spawnExplosion(x, y) {
  const count = 25;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    const speed = 1 + Math.random() * 3;
    const hue = Math.random() > 0.5 ? 0 : 30; // red and orange
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 20 + Math.random() * 15,
      maxLife: 35,
      size: 2 + Math.random() * 3,
      type: 'explosion',
      hue
    });
  }
  // Central flash
  particles.push({
    x, y, vx: 0, vy: 0,
    life: 8, maxLife: 8,
    size: 20, type: 'flash',
    color: 'rgba(255, 200, 50, 0.8)'
  });
}

function spawnHealEffect(x, y) {
  const count = 20;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    const speed = 0.8 + Math.random() * 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.5, // slight upward bias
      life: 25 + Math.random() * 15,
      maxLife: 40,
      size: 2 + Math.random() * 3,
      type: 'heal',
      hue: 200 + Math.random() * 40 // blue range
    });
  }
  // Central blue flash
  particles.push({
    x, y, vx: 0, vy: 0,
    life: 10, maxLife: 10,
    size: 18, type: 'flash',
    color: 'rgba(50, 150, 255, 0.8)'
  });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    // Slow down
    if (p.type === 'explosion' || p.type === 'heal') {
      p.vx *= 0.96;
      p.vy *= 0.96;
    }
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

// ============ DRAWING ============
function draw(timestamp) {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid (subtle)
  ctx.strokeStyle = 'rgba(30, 30, 60, 0.4)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= cols; x++) {
    ctx.beginPath();
    ctx.moveTo(x * GRID_SIZE, 0);
    ctx.lineTo(x * GRID_SIZE, rows * GRID_SIZE);
    ctx.stroke();
  }
  for (let y = 0; y <= rows; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * GRID_SIZE);
    ctx.lineTo(cols * GRID_SIZE, y * GRID_SIZE);
    ctx.stroke();
  }

  // Draw pills
  for (const p of pills) {
    const cx = p.x * GRID_SIZE + GRID_SIZE / 2;
    const cy = p.y * GRID_SIZE + GRID_SIZE / 2;
    const pulse = Math.sin(timestamp * 0.006) * 2;
    const r = GRID_SIZE / 2 - 2 + pulse;

    ctx.save();
    ctx.globalAlpha = p.alpha;

    // Glow
    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2);
    glow.addColorStop(0, 'rgba(0, 255, 200, 0.3)');
    glow.addColorStop(1, 'rgba(0, 255, 200, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(cx - r * 2, cy - r * 2, r * 4, r * 4);

    // Pill body
    ctx.fillStyle = '#00ffc8';
    ctx.shadowColor = '#00ffc8';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.roundRect(p.x * GRID_SIZE + 2, p.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4, 4);
    ctx.fill();

    // Cross symbol
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#0a0a1a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - 3, cy);
    ctx.lineTo(cx + 3, cy);
    ctx.moveTo(cx, cy - 3);
    ctx.lineTo(cx, cy + 3);
    ctx.stroke();

    ctx.restore();
  }

  // Draw missile trails and airflow particles
  for (const p of particles) {
    if (p.type === 'airflow') {
      const alpha = (p.life / p.maxLife) * 0.35;
      ctx.fillStyle = `rgba(255, 120, 50, ${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw missiles
  for (const m of missiles) {
    // Trail with gradient
    for (let t = 0; t < m.trail.length; t++) {
      const progress = t / m.trail.length;
      const alpha = progress * 0.6;
      // Color goes from dark orange to bright red
      const r = 255;
      const g = Math.floor(60 + progress * 80);
      const b = Math.floor(20 + progress * 20);
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
      const tr = 2 + progress * 4;
      ctx.beginPath();
      ctx.arc(m.trail[t].x, m.trail[t].y, tr, 0, Math.PI * 2);
      ctx.fill();
    }

    // Missile glow
    const missileGlow = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, 14);
    missileGlow.addColorStop(0, 'rgba(255, 80, 30, 0.3)');
    missileGlow.addColorStop(1, 'rgba(255, 80, 30, 0)');
    ctx.fillStyle = missileGlow;
    ctx.fillRect(m.x - 14, m.y - 14, 28, 28);

    // Missile body
    ctx.fillStyle = '#ff3333';
    ctx.shadowColor = '#ff4400';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(m.x, m.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Missile core highlight
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath();
    ctx.arc(m.x, m.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw snake
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];

    // Check for segment effects
    const effect = segmentEffects.find(e => e.index === i);
    let fillColor;
    let glowColor = null;
    let glowSize = 0;
    if (effect) {
      const t = effect.timer / (effect.maxTimer || 30);
      const flashPhase = Math.sin(effect.timer * 1.2) * 0.5 + 0.5;
      const intensity = t; // stronger at start, fades out
      if (effect.color === 'hit') {
        // Red flash for missile hit - very bright with white peaks
        const l = 50 + flashPhase * 45 * intensity;
        fillColor = `hsl(${flashPhase * 20}, 100%, ${l}%)`;
        glowColor = `rgba(255, 50, 20, ${0.6 * intensity})`;
        glowSize = 10 + flashPhase * 6;
      } else if (effect.color === 'blue') {
        // Blue flash for pill shrink - bright blue with white peaks
        const l = 50 + flashPhase * 45 * intensity;
        fillColor = `hsl(${200 + flashPhase * 20}, 100%, ${l}%)`;
        glowColor = `rgba(30, 150, 255, ${0.6 * intensity})`;
        glowSize = 10 + flashPhase * 6;
      } else if (effect.color === 'grow') {
        // Yellow-green flash for auto grow
        const l = 50 + flashPhase * 40 * intensity;
        fillColor = `hsl(${60 + flashPhase * 60}, 100%, ${l}%)`;
        glowColor = `rgba(200, 255, 0, ${0.5 * intensity})`;
        glowSize = 8 + flashPhase * 5;
      }
    } else {
      // Solid neon green for all segments - head slightly brighter
      fillColor = i === 0 ? '#00ff88' : '#00dd66';
    }

    ctx.fillStyle = fillColor;

    // Segment glow effect
    if (glowColor) {
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = glowSize;
    } else if (i === 0) {
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 12;
    }

    const padding = i === 0 ? 1 : 2;
    // Make flashing segments slightly larger
    const shrink = effect ? 0 : 1;
    ctx.beginPath();
    ctx.roundRect(
      s.x * GRID_SIZE + padding - shrink,
      s.y * GRID_SIZE + padding - shrink,
      GRID_SIZE - (padding - shrink) * 2,
      GRID_SIZE - (padding - shrink) * 2,
      i === 0 ? 5 : 3
    );
    ctx.fill();
    ctx.shadowBlur = 0;

    // Eyes on head
    if (i === 0) {
      ctx.fillStyle = '#0a0a1a';
      const cx = s.x * GRID_SIZE + GRID_SIZE / 2;
      const cy = s.y * GRID_SIZE + GRID_SIZE / 2;
      let ex1, ey1, ex2, ey2;
      const ed = 3;
      if (direction === DIRECTIONS.RIGHT) {
        ex1 = cx + 3; ey1 = cy - ed; ex2 = cx + 3; ey2 = cy + ed;
      } else if (direction === DIRECTIONS.LEFT) {
        ex1 = cx - 3; ey1 = cy - ed; ex2 = cx - 3; ey2 = cy + ed;
      } else if (direction === DIRECTIONS.UP) {
        ex1 = cx - ed; ey1 = cy - 3; ex2 = cx + ed; ey2 = cy - 3;
      } else {
        ex1 = cx - ed; ey1 = cy + 3; ex2 = cx + ed; ey2 = cy + 3;
      }
      ctx.beginPath();
      ctx.arc(ex1, ey1, 1.5, 0, Math.PI * 2);
      ctx.arc(ex2, ey2, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw particles (on top of snake)
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);

    if (p.type === 'explosion') {
      // Red/orange explosion particles
      ctx.fillStyle = `hsla(${p.hue}, 100%, 55%, ${alpha})`;
      ctx.shadowColor = `hsla(${p.hue}, 100%, 55%, ${alpha * 0.5})`;
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else if (p.type === 'heal') {
      // Blue healing particles
      ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${alpha})`;
      ctx.shadowColor = `hsla(${p.hue}, 100%, 65%, ${alpha * 0.5})`;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else if (p.type === 'flash') {
      // Central flash (explosion or heal)
      ctx.save();
      ctx.globalAlpha = alpha;
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * alpha);
      grad.addColorStop(0, p.color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
      ctx.restore();
    }
    // airflow particles are drawn before missiles, skip here
  }

  // Draw score popups (on top of everything)
  for (const sp of scorePopups) {
    const alpha = Math.max(0, sp.timer / sp.maxTimer);
    const scale = 0.8 + alpha * 0.4; // start large, shrink
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = sp.color;
    ctx.font = `bold ${Math.round(16 * scale)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.shadowColor = sp.color;
    ctx.shadowBlur = 8;
    ctx.fillText(sp.text, sp.x, sp.y);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ============ HUD ============
function updateHUD() {
  document.getElementById('hudScore').textContent = `得分: ${score}`;
  document.getElementById('hudLength').textContent = `长度: ${snake.length}`;
  document.getElementById('hudTime').textContent = `${survivalTime}s`;
}

// ============ GAME OVER ============
function gameOver() {
  gameRunning = false;
  if (animFrameId) cancelAnimationFrame(animFrameId);
  stopBgMusic();

  document.getElementById('hud').classList.add('hidden');
  document.getElementById('pauseBtn').classList.add('hidden');

  // Save score
  saveScore(score);

  document.getElementById('finalScore').textContent = score;
  document.getElementById('deathReason').textContent = deathReason;
  document.getElementById('gameOverScreen').classList.remove('hidden');

  renderLeaderboards();
}

// ============ PAUSE ============
function togglePause() {
  gamePaused = !gamePaused;
  document.getElementById('pauseBtn').textContent = gamePaused ? '继续' : '暂停';
  if (!gamePaused) {
    lastMoveTime = performance.now();
    lastAutoGrowTime = performance.now();
    lastSurvivalScoreTime = performance.now();
  }
}

// ============ LEADERBOARD (localStorage) ============
function getWeekKey(date) {
  const d = new Date(date);
  const start = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${week}`;
}

function getScores() {
  try {
    return JSON.parse(localStorage.getItem('snakeScores') || '[]');
  } catch { return []; }
}

function saveScore(score) {
  const scores = getScores();
  scores.push({ score, date: Date.now(), week: getWeekKey(new Date()) });
  localStorage.setItem('snakeScores', JSON.stringify(scores));
  saveWeeklyChampion(score);
}

function getCurrentWeekScores() {
  const currentWeek = getWeekKey(new Date());
  return getScores().filter(s => s.week === currentWeek).sort((a, b) => b.score - a.score);
}

function getAllTimeScores() {
  return getScores().sort((a, b) => b.score - a.score).slice(0, 10);
}

function saveWeeklyChampion(score) {
  const champions = getWeeklyChampions();
  const currentWeek = getWeekKey(new Date());
  const existing = champions.find(c => c.week === currentWeek);
  if (existing) {
    if (score > existing.champion) {
      existing.runnerUp = existing.champion;
      existing.champion = score;
    } else if (score > existing.runnerUp) {
      existing.runnerUp = score;
    }
  } else {
    champions.push({ week: currentWeek, champion: score, runnerUp: 0 });
  }
  // Keep only last 12 weeks
  while (champions.length > 12) champions.shift();
  localStorage.setItem('snakeWeeklyChampions', JSON.stringify(champions));
}

function getWeeklyChampions() {
  try {
    return JSON.parse(localStorage.getItem('snakeWeeklyChampions') || '[]');
  } catch { return []; }
}

function renderLeaderboardHTML(scores) {
  if (scores.length === 0) return '<p style="text-align:center;color:#555;font-size:0.8em;">暂无记录</p>';
  let html = '<table><tr><th>#</th><th>得分</th><th>时间</th></tr>';
  scores.slice(0, 10).forEach((s, i) => {
    const rankClass = i < 3 ? `rank-${i + 1}` : '';
    const date = new Date(s.date);
    const timeStr = `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
    html += `<tr class="${rankClass}"><td>${i + 1}</td><td>${s.score}</td><td>${timeStr}</td></tr>`;
  });
  html += '</table>';
  return html;
}

function renderWeeklyChampionsHTML() {
  const champions = getWeeklyChampions();
  if (champions.length === 0) return '';
  let html = '';
  champions.slice(-4).reverse().forEach(c => {
    html += `<p>🏆 ${c.week}: 冠军 ${c.champion} | 亚军 ${c.runnerUp || '-'}</p>`;
  });
  return html;
}

function renderLeaderboards() {
  const weekScores = getCurrentWeekScores();
  const allScores = getAllTimeScores();
  const championsHTML = renderWeeklyChampionsHTML();

  const lbHTML = `<h3>本周排行</h3>${renderLeaderboardHTML(weekScores)}`;

  document.getElementById('startLeaderboard').innerHTML = lbHTML;
  document.getElementById('endLeaderboard').innerHTML = lbHTML;
  document.getElementById('startWeeklyChampions').innerHTML = championsHTML ? `<h3>历届冠军</h3>${championsHTML}` : '';
  document.getElementById('endWeeklyChampions').innerHTML = championsHTML ? `<h3>历届冠军</h3>${championsHTML}` : '';
}

// ============ UTILS ============
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ============ BOOT ============
init();
</script>
