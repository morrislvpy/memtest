<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>贪吃蛇大作战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #e0e0ff;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    height: 100vh;
    width: 100vw;
  }
  #gameCanvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }
  .overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10, 10, 26, 0.92);
    z-index: 10;
    transition: opacity 0.3s;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 2.2em;
    background: linear-gradient(90deg, #00ff88, #00ccff, #ff66cc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.3em;
  }
  .overlay h2 {
    font-size: 1.5em;
    color: #ff4466;
    margin-bottom: 0.5em;
  }
  .overlay p {
    color: #8888aa;
    margin-bottom: 0.4em;
    font-size: 0.95em;
    text-align: center;
    max-width: 320px;
    line-height: 1.5;
  }
  .overlay .score-display {
    font-size: 2em;
    color: #00ff88;
    margin: 0.3em 0;
  }
  .btn {
    margin-top: 1em;
    padding: 14px 48px;
    font-size: 1.15em;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: linear-gradient(135deg, #00ff88, #00ccff);
    color: #0a0a1a;
    font-weight: bold;
    letter-spacing: 1px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:active { transform: scale(0.95); }
  .btn:hover { box-shadow: 0 0 20px rgba(0,255,136,0.4); }
  .leaderboard {
    margin-top: 1em;
    width: 280px;
    max-height: 200px;
    overflow-y: auto;
  }
  .leaderboard h3 {
    font-size: 1em;
    color: #ffcc00;
    margin-bottom: 0.4em;
    text-align: center;
  }
  .leaderboard table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85em;
  }
  .leaderboard th {
    color: #8888aa;
    padding: 3px 6px;
    border-bottom: 1px solid #333;
    text-align: left;
  }
  .leaderboard td {
    padding: 3px 6px;
    border-bottom: 1px solid #1a1a2e;
  }
  .leaderboard .rank-1 { color: #ffd700; }
  .leaderboard .rank-2 { color: #c0c0c0; }
  .leaderboard .rank-3 { color: #cd7f32; }
  .weekly-champions {
    margin-top: 0.8em;
    width: 280px;
  }
  .weekly-champions h3 {
    font-size: 0.9em;
    color: #ff66cc;
    margin-bottom: 0.3em;
    text-align: center;
  }
  .weekly-champions p {
    font-size: 0.8em;
    color: #7777aa;
    margin: 0.15em 0;
    text-align: center;
  }
  #hud {
    position: fixed;
    top: 8px; left: 8px; right: 8px;
    display: flex;
    justify-content: space-between;
    z-index: 5;
    pointer-events: none;
    font-size: 0.9em;
  }
  #hud span {
    background: rgba(10,10,26,0.7);
    padding: 4px 10px;
    border-radius: 12px;
  }
  .hud-score { color: #00ff88; }
  .hud-length { color: #00ccff; }
  .hud-time { color: #ffcc00; }
  #pauseBtn {
    position: fixed;
    top: 8px; right: 8px;
    z-index: 6;
    background: rgba(10,10,26,0.7);
    color: #aaa;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 0.85em;
    cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud" class="hidden">
  <span class="hud-score" id="hudScore">得分: 0</span>
  <span class="hud-length" id="hudLength">长度: 3</span>
  <span class="hud-time" id="hudTime">0s</span>
  <span style="color:#ff6644" id="hudDifficulty">Lv1</span>
</div>
<button id="pauseBtn" class="hidden" onclick="togglePause()">暂停</button>

<!-- Start Screen -->
<div id="startScreen" class="overlay">
  <h1>贪吃蛇大作战</h1>
  <p>蛇身每5秒自动增长1单位</p>
  <p>躲避导弹！被击中蛇身+1</p>
  <p>吃掉药片缩短2单位，+10分</p>
  <p>蛇过长时出现超级药包(金星)，缩短一半+全弹爆破</p>
  <p>滑动屏幕控制方向</p>
  <button class="btn" onclick="startGame()">开始游戏</button>
  <div class="leaderboard" id="startLeaderboard"></div>
  <div class="weekly-champions" id="startWeeklyChampions"></div>
</div>

<!-- Game Over Screen -->
<div id="gameOverScreen" class="overlay hidden">
  <h2>游戏结束</h2>
  <div class="score-display" id="finalScore">0</div>
  <p id="deathReason"></p>
  <button class="btn" onclick="startGame()">再来一局</button>
  <div class="leaderboard" id="endLeaderboard"></div>
  <div class="weekly-champions" id="endWeeklyChampions"></div>
</div>

<script>
// ============ CONSTANTS ============
const GRID_SIZE = 18;
const AUTO_GROW_INTERVAL = 5000; // ms
const MISSILE_COUNT_RANGE = [2, 4];
const PILL_COUNT_RANGE = [1, 3];
const PILL_LIFETIME = 5000; // ms
const PILL_SHRINK = 2;
const MISSILE_HIT_GROW = 1;
const PILL_SCORE = 10;
const SURVIVAL_SCORE_INTERVAL = 1000; // ms
const MISSILE_SPEED = 1.54;
const SNAKE_SPEED = 169; // ms per move
const SUPER_PILL_LENGTH_TRIGGER = 30; // snake length to trigger super pill
const SUPER_PILL_LIFETIME = 3000; // ms
const SUPER_PILL_COOLDOWN_RANGE = [8000, 15000]; // random 8-15s between super pills
const DIFFICULTY_UP_INTERVAL = 30000; // ms, every 30s difficulty increases
const DIRECTIONS = {
  UP: { x: 0, y: -1 },
  DOWN: { x: 0, y: 1 },
  LEFT: { x: -1, y: 0 },
  RIGHT: { x: 1, y: 0 }
};

// ============ STATE ============
let canvas, ctx;
let cols, rows;
let snake = [];
let direction = DIRECTIONS.RIGHT;
let nextDirection = DIRECTIONS.RIGHT;
let missiles = [];
let pills = [];
let particles = []; // visual effects particles
let segmentEffects = []; // { index, color, timer, maxTimer }
let scorePopups = []; // { x, y, text, color, timer, maxTimer }
let superPill = null; // { x, y, spawnTime, alpha }
let superPillTriggered = false; // whether current length threshold was already triggered
let superPillLastTime = 0; // timestamp of last super pill end
let superPillNextCooldown = 0; // next random cooldown duration in ms
let difficultyLevel = 1; // increases over time, affects missile count/speed and pill count
let lastDifficultyUpTime = 0;
let score = 0;
let survivalTime = 0;
let gameRunning = false;
let gamePaused = false;
let lastMoveTime = 0;
let lastAutoGrowTime = 0;
let lastSurvivalScoreTime = 0;
let pillSpawnTimer = 0;
let animFrameId = null;
let deathReason = '';
let snakeFlashTimer = 0;

// ============ INIT ============
function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  setupTouchControls();
  setupKeyboardControls();
  renderLeaderboards();
}

// ============ AUDIO (Web Audio API) ============
let audioCtx = null;
let bgMusicGain = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}

function playExplosionSound() {
  const ctx = ensureAudio();
  const now = ctx.currentTime;
  const sr = ctx.sampleRate;

  // Punchy BOOM with more body - total ~1.0s
  const len = sr * 1.0;
  const buf = ctx.createBuffer(1, len, sr);
  const d = buf.getChannelData(0);

  for (let i = 0; i < len; i++) {
    const t = i / sr;
    let sample = 0;

    // Sharp crack (0-25ms) - louder, more aggressive
    if (t < 0.025) {
      const env = Math.pow(1 - t / 0.025, 0.3);
      sample += (Math.random() * 2 - 1) * env * 1.0;
    }

    // Impact thump (5ms-300ms) - longer body, the BOOM
    if (t > 0.005 && t < 0.3) {
      const env = Math.pow(1 - (t - 0.005) / 0.295, 0.35);
      const freq = 200 - (t - 0.005) * 500; // 200→50Hz sweep
      sample += Math.sin(2 * Math.PI * freq * t) * env * 1.2;
      // Harmonic punch for more "blast" feel
      sample += Math.sin(2 * Math.PI * freq * 2 * t) * env * 0.3;
    }

    // Resonant tail (50ms-1000ms) - medium decay with rumble
    if (t > 0.05 && t < 1.0) {
      const env = Math.pow(1 - (t - 0.05) / 0.95, 1.5);
      sample += Math.sin(2 * Math.PI * 90 * t) * env * 0.6;
      sample += Math.sin(2 * Math.PI * 45 * t) * env * 0.3; // sub harmonic
    }

    // Rumble noise (50ms-800ms)
    if (t > 0.05 && t < 0.8) {
      const env = Math.pow(1 - (t - 0.05) / 0.75, 1.8);
      sample += (Math.random() * 2 - 1) * env * 0.25;
    }

    d[i] = Math.max(-1, Math.min(1, sample));
  }

  const src = ctx.createBufferSource();
  src.buffer = buf;

  const comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -10;
  comp.ratio.value = 8;
  comp.attack.value = 0.001;
  comp.release.value = 0.15;

  const gain = ctx.createGain();
  gain.gain.value = 0.9;

  src.connect(comp);
  comp.connect(gain);
  gain.connect(ctx.destination);
  src.start(now);
}

function playHealSound() {
  const ctx = ensureAudio();
  const now = ctx.currentTime;

  // Rising chime
  const osc1 = ctx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(523, now);
  osc1.frequency.setValueAtTime(659, now + 0.08);
  osc1.frequency.setValueAtTime(784, now + 0.16);
  const gain1 = ctx.createGain();
  gain1.gain.setValueAtTime(0.3, now);
  gain1.gain.setValueAtTime(0.3, now + 0.12);
  gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
  osc1.connect(gain1);
  gain1.connect(ctx.destination);
  osc1.start(now);
  osc1.stop(now + 0.4);

  // Sparkle
  const osc2 = ctx.createOscillator();
  osc2.type = 'triangle';
  osc2.frequency.value = 1047;
  const gain2 = ctx.createGain();
  gain2.gain.setValueAtTime(0, now);
  gain2.gain.linearRampToValueAtTime(0.2, now + 0.08);
  gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
  osc2.connect(gain2);
  gain2.connect(ctx.destination);
  osc2.start(now + 0.08);
  osc2.stop(now + 0.35);
}

// ============ BACKGROUND MUSIC ============
let bgMusicOscs = null;
let bgMusicTimer = null;

// Fast tense rhythm - A minor, ~140bpm, staccato pattern
// Higher register for phone audibility, aggressive staccato feel
const BGM_MELODY = [
  // Bar 1: A4 A4 B4 C5 - B4 A4 - A4
  { f: 440, d: 0.2 }, { f: 440, d: 0.2 }, { f: 493.88, d: 0.2 }, { f: 523.25, d: 0.2 },
  { f: 493.88, d: 0.2 }, { f: 440, d: 0.2 }, { f: 0, d: 0.2 }, { f: 440, d: 0.2 },
  // Bar 2: E5 - E5 - D5 C5 - -
  { f: 659.25, d: 0.2 }, { f: 0, d: 0.2 }, { f: 659.25, d: 0.2 }, { f: 0, d: 0.2 },
  { f: 587.33, d: 0.2 }, { f: 523.25, d: 0.2 }, { f: 0, d: 0.2 }, { f: 0, d: 0.4 },
  // Bar 3: A4 A4 B4 C5 - C5 D5 -
  { f: 440, d: 0.2 }, { f: 440, d: 0.2 }, { f: 493.88, d: 0.2 }, { f: 523.25, d: 0.2 },
  { f: 0, d: 0.2 }, { f: 523.25, d: 0.2 }, { f: 587.33, d: 0.2 }, { f: 0, d: 0.4 },
  // Bar 4: E5 D5 C5 B4 A4 - - -
  { f: 659.25, d: 0.2 }, { f: 587.33, d: 0.2 }, { f: 523.25, d: 0.2 }, { f: 493.88, d: 0.2 },
  { f: 440, d: 0.4 }, { f: 0, d: 0.2 }, { f: 0, d: 0.2 }, { f: 0, d: 0.4 },
  // Bar 5: A4 - A4 C5 E5 - D5 C5
  { f: 440, d: 0.2 }, { f: 0, d: 0.2 }, { f: 440, d: 0.2 }, { f: 523.25, d: 0.2 },
  { f: 659.25, d: 0.2 }, { f: 0, d: 0.2 }, { f: 587.33, d: 0.2 }, { f: 523.25, d: 0.2 },
  // Bar 6: B4 - B4 D5 F5 - E5 D5
  { f: 493.88, d: 0.2 }, { f: 0, d: 0.2 }, { f: 493.88, d: 0.2 }, { f: 587.33, d: 0.2 },
  { f: 698.46, d: 0.2 }, { f: 0, d: 0.2 }, { f: 659.25, d: 0.2 }, { f: 587.33, d: 0.2 },
  // Bar 7: C5 B4 A4 G4# A4 B4 - -
  { f: 523.25, d: 0.2 }, { f: 493.88, d: 0.2 }, { f: 440, d: 0.2 }, { f: 415.30, d: 0.2 },
  { f: 440, d: 0.2 }, { f: 493.88, d: 0.4 }, { f: 0, d: 0.2 }, { f: 0, d: 0.4 },
  // Bar 8: A4 - - - A4 - - -
  { f: 440, d: 0.2 }, { f: 0, d: 0.2 }, { f: 0, d: 0.2 }, { f: 0, d: 0.2 },
  { f: 440, d: 0.4 }, { f: 0, d: 0.2 }, { f: 0, d: 0.2 }, { f: 0, d: 0.4 },
];

// Bass pattern - faster, rhythmic
const BGM_BASS = [
  [220, 220, 261.63, 220],   // A3 A3 C4 A3
  [329.63, 329.63, 293.66, 261.63], // E4 E4 D4 C4
  [220, 220, 261.63, 293.66], // A3 A3 C4 D4
  [329.63, 293.66, 261.63, 220], // E4 D4 C4 A3
  [220, 220, 261.63, 329.63], // A3 A3 C4 E4
  [246.94, 246.94, 293.66, 349.23], // B3 B3 D4 F4
  [261.63, 220, 207.65, 220], // C4 A3 G#3 A3
  [220, 220, 220, 220],       // A3 A3 A3 A3
];

function startBgMusic() {
  const ctx = ensureAudio();

  // Master gain - louder
  bgMusicGain = ctx.createGain();
  bgMusicGain.gain.setValueAtTime(0, ctx.currentTime);
  bgMusicGain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + 2);
  bgMusicGain.connect(ctx.destination);

  function scheduleMelodyLoop() {
    if (!bgMusicGain) return;

    const now = ctx.currentTime;
    let t = now;
    const barLen = 0.2 * 8; // 8 notes per bar, 0.2s each = 1.6s per bar

    for (let n = 0; n < BGM_MELODY.length; n++) {
      const note = BGM_MELODY[n];
      if (note.f > 0) {
        // Main melody - square wave for sharper, more urgent attack
        const osc = ctx.createOscillator();
        osc.type = 'square';
        osc.frequency.value = note.f;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.12, t + 0.01); // fast attack
        gain.gain.setValueAtTime(0.10, t + note.d * 0.3);
        gain.gain.linearRampToValueAtTime(0, t + note.d * 0.85); // staccato
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 2000;
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(bgMusicGain);
        osc.start(t);
        osc.stop(t + note.d);

        // Octave above (sine, very quiet sparkle)
        const osc2 = ctx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.value = note.f * 2;
        const gain2 = ctx.createGain();
        gain2.gain.setValueAtTime(0, t);
        gain2.gain.linearRampToValueAtTime(0.04, t + 0.01);
        gain2.gain.linearRampToValueAtTime(0, t + note.d * 0.7);
        osc2.connect(gain2);
        gain2.connect(bgMusicGain);
        osc2.start(t);
        osc2.stop(t + note.d);
      }

      // Bass note - on every beat (every 2 melody notes)
      if (n % 2 === 0) {
        const barIdx = Math.floor(n / 8);
        const beatIdx = Math.floor((n % 8) / 2);
        const bassBar = BGM_BASS[barIdx % BGM_BASS.length];
        const bassFreq = bassBar[beatIdx % bassBar.length];

        const bassOsc = ctx.createOscillator();
        bassOsc.type = 'sawtooth';
        bassOsc.frequency.value = bassFreq;
        const bassGain = ctx.createGain();
        bassGain.gain.setValueAtTime(0, t);
        bassGain.gain.linearRampToValueAtTime(0.08, t + 0.01);
        bassGain.gain.setValueAtTime(0.06, t + 0.3);
        bassGain.gain.linearRampToValueAtTime(0, t + 0.38);
        const bassFilter = ctx.createBiquadFilter();
        bassFilter.type = 'lowpass';
        bassFilter.frequency.value = 500;
        bassOsc.connect(bassFilter);
        bassFilter.connect(bassGain);
        bassGain.connect(bgMusicGain);
        bassOsc.start(t);
        bassOsc.stop(t + 0.4);

        // Rhythmic kick-like hit on every bass note
        const kickLen = ctx.sampleRate * 0.08;
        const kickBuf = ctx.createBuffer(1, kickLen, ctx.sampleRate);
        const kickData = kickBuf.getChannelData(0);
        for (let k = 0; k < kickLen; k++) {
          const kt = k / ctx.sampleRate;
          const kickFreq = 150 * Math.exp(-kt * 40);
          kickData[k] = Math.sin(2 * Math.PI * kickFreq * kt) * Math.exp(-kt * 30) * 0.3;
        }
        const kickSrc = ctx.createBufferSource();
        kickSrc.buffer = kickBuf;
        const kickGain = ctx.createGain();
        kickGain.gain.value = 0.15;
        kickSrc.connect(kickGain);
        kickGain.connect(bgMusicGain);
        kickSrc.start(t);
      }

      t += note.d;
    }

    const loopDuration = t - now;
    bgMusicTimer = setTimeout(scheduleMelodyLoop, (loopDuration - 0.05) * 1000);
  }

  scheduleMelodyLoop();
}

function stopBgMusic() {
  if (bgMusicTimer) {
    clearTimeout(bgMusicTimer);
    bgMusicTimer = null;
  }
  if (bgMusicGain) {
    const ctx = ensureAudio();
    bgMusicGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
    const gain = bgMusicGain;
    bgMusicGain = null;
    setTimeout(() => { try { gain.disconnect(); } catch(e) {} }, 600);
  }
}

// ============ SCORE POPUP ============
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({
    x, y, text, color,
    timer: 45,
    maxTimer: 45
  });
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cols = Math.floor(canvas.width / GRID_SIZE);
  rows = Math.floor(canvas.height / GRID_SIZE);
}

// ============ TOUCH CONTROLS ============
let touchStartX = 0, touchStartY = 0;
function setupTouchControls() {
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (!gameRunning || gamePaused) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const minSwipe = 20;
    if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > 0 && direction !== DIRECTIONS.LEFT) nextDirection = DIRECTIONS.RIGHT;
      else if (dx < 0 && direction !== DIRECTIONS.RIGHT) nextDirection = DIRECTIONS.LEFT;
    } else {
      if (dy > 0 && direction !== DIRECTIONS.UP) nextDirection = DIRECTIONS.DOWN;
      else if (dy < 0 && direction !== DIRECTIONS.DOWN) nextDirection = DIRECTIONS.UP;
    }
  }, { passive: false });
}

// ============ KEYBOARD CONTROLS ============
function setupKeyboardControls() {
  document.addEventListener('keydown', (e) => {
    if (!gameRunning || gamePaused) return;
    switch(e.key) {
      case 'ArrowUp': case 'w': case 'W':
        if (direction !== DIRECTIONS.DOWN) nextDirection = DIRECTIONS.UP; break;
      case 'ArrowDown': case 's': case 'S':
        if (direction !== DIRECTIONS.UP) nextDirection = DIRECTIONS.DOWN; break;
      case 'ArrowLeft': case 'a': case 'A':
        if (direction !== DIRECTIONS.RIGHT) nextDirection = DIRECTIONS.LEFT; break;
      case 'ArrowRight': case 'd': case 'D':
        if (direction !== DIRECTIONS.LEFT) nextDirection = DIRECTIONS.RIGHT; break;
    }
  });
}

// ============ GAME START ============
function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('pauseBtn').classList.remove('hidden');

  resizeCanvas();
  const startX = Math.floor(cols / 2);
  const startY = Math.floor(rows / 2);
  snake = [
    { x: startX, y: startY },
    { x: startX - 1, y: startY },
    { x: startX - 2, y: startY }
  ];
  direction = DIRECTIONS.RIGHT;
  nextDirection = DIRECTIONS.RIGHT;
  missiles = [];
  pills = [];
  particles = [];
  segmentEffects = [];
  scorePopups = [];
  superPill = null;
  superPillTriggered = false;
  superPillLastTime = 0;
  superPillNextCooldown = 0;
  difficultyLevel = 1;
  lastDifficultyUpTime = 0;
  score = 0;
  survivalTime = 0;
  gameRunning = true;
  gamePaused = false;
  deathReason = '';
  lastMoveTime = performance.now();
  lastAutoGrowTime = performance.now();
  lastSurvivalScoreTime = performance.now();
  pillSpawnTimer = 0;

  // Spawn initial missiles
  const mRange = getMissileCountRange();
  const mCount = randInt(mRange[0], mRange[1]);
  for (let i = 0; i < mCount; i++) spawnMissile();

  // Spawn initial pills
  spawnPills();

  if (animFrameId) cancelAnimationFrame(animFrameId);
  startBgMusic();
  gameLoop(performance.now());
}

// ============ GAME LOOP ============
function gameLoop(timestamp) {
  if (!gameRunning) return;
  if (gamePaused) {
    animFrameId = requestAnimationFrame(gameLoop);
    return;
  }

  const dt = timestamp - lastMoveTime;

  // Move snake
  if (dt >= SNAKE_SPEED) {
    lastMoveTime = timestamp;
    direction = nextDirection;
    moveSnake();
  }

  // Auto grow
  if (timestamp - lastAutoGrowTime >= AUTO_GROW_INTERVAL) {
    lastAutoGrowTime = timestamp;
    autoGrow();
  }

  // Survival score
  if (timestamp - lastSurvivalScoreTime >= SURVIVAL_SCORE_INTERVAL) {
    lastSurvivalScoreTime = timestamp;
    score += 1;
    survivalTime += 1;
    // Score popup near head
    if (snake.length > 0) {
      const hx = snake[0].x * GRID_SIZE + GRID_SIZE / 2;
      const hy = snake[0].y * GRID_SIZE;
      spawnScorePopup(hx, hy, '+1', '#ffcc00');
    }
  }

  // Difficulty increase every 30 seconds
  if (!lastDifficultyUpTime) lastDifficultyUpTime = timestamp;
  if (timestamp - lastDifficultyUpTime >= DIFFICULTY_UP_INTERVAL) {
    lastDifficultyUpTime = timestamp;
    difficultyLevel++;
    // Spawn additional missiles for new difficulty
    const newRange = getMissileCountRange();
    const targetCount = randInt(newRange[0], newRange[1]);
    while (missiles.length < targetCount) spawnMissile();
  }

  // Update missiles
  updateMissiles();

  // Check missile collision
  checkMissileCollision();

  // Update pills
  updatePills(timestamp);

  // Pill spawn timer
  pillSpawnTimer += 16;
  if (pillSpawnTimer >= 4000) {
    pillSpawnTimer = 0;
    const pRange = getPillCountRange();
    if (pills.length < pRange[1]) spawnPills();
  }

  // Super pill logic
  updateSuperPill(timestamp);

  // Update particles
  updateParticles();

  // Update segment effects - stronger flash with longer timer
  for (let i = segmentEffects.length - 1; i >= 0; i--) {
    segmentEffects[i].timer--;
    if (segmentEffects[i].timer <= 0) segmentEffects.splice(i, 1);
  }

  // Update score popups
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].y -= 0.8;
    scorePopups[i].timer--;
    if (scorePopups[i].timer <= 0) scorePopups.splice(i, 1);
  }

  // Update HUD
  updateHUD();

  // Draw
  draw(timestamp);

  animFrameId = requestAnimationFrame(gameLoop);
}

// ============ SNAKE MOVEMENT ============
function moveSnake() {
  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  // Wall collision
  if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
    deathReason = '撞墙了！';
    gameOver();
    return;
  }

  // Self collision
  for (let i = 0; i < snake.length; i++) {
    if (head.x === snake[i].x && head.y === snake[i].y) {
      deathReason = '咬到自己了！';
      gameOver();
      return;
    }
  }

  snake.unshift(head);

  // Check pill collision
  let atePill = false;
  for (let i = pills.length - 1; i >= 0; i--) {
    if (head.x === pills[i].x && head.y === pills[i].y) {
      atePill = true;
      score += PILL_SCORE;
      const pillX = pills[i].x * GRID_SIZE + GRID_SIZE / 2;
      const pillY = pills[i].y * GRID_SIZE + GRID_SIZE / 2;
      pills.splice(i, 1);
      // Blue healing effect + sound
      spawnHealEffect(pillX, pillY);
      playHealSound();
      // Score popup
      spawnScorePopup(pillX, pillY - 5, '+10', '#00ccff');
      // Shrink snake
      const shrinkAmount = Math.min(PILL_SHRINK, snake.length - 1);
      if (shrinkAmount > 0) {
        // Flash the remaining tail segments blue (stronger)
        for (let k = 0; k < Math.min(shrinkAmount + 2, snake.length); k++) {
          const idx = snake.length - 1 - k;
          if (idx >= 0) {
            segmentEffects.push({ index: idx, color: 'blue', timer: 30, maxTimer: 30 });
          }
        }
        snake.splice(snake.length - shrinkAmount, shrinkAmount);
      }
      break;
    }
  }

  if (!atePill) {
    snake.pop();
  }
}

function autoGrow() {
  const tail = snake[snake.length - 1];
  snake.push({ x: tail.x, y: tail.y });
  // Flash the new tail segment (stronger)
  segmentEffects.push({ index: snake.length - 1, color: 'grow', timer: 30, maxTimer: 30 });
  // Also flash a couple nearby segments
  if (snake.length > 2) segmentEffects.push({ index: snake.length - 2, color: 'grow', timer: 20, maxTimer: 20 });
}

// ============ MISSILES ============
function spawnMissile() {
  const edge = randInt(0, 3); // 0=top, 1=right, 2=bottom, 3=left
  let x, y, vx, vy;
  const speed = getMissileSpeed() * (0.7 + Math.random() * 0.6);

  switch(edge) {
    case 0: // top
      x = Math.random() * canvas.width;
      y = -10;
      vx = (Math.random() - 0.5) * speed;
      vy = Math.random() * speed * 0.5 + speed * 0.5;
      break;
    case 1: // right
      x = canvas.width + 10;
      y = Math.random() * canvas.height;
      vx = -(Math.random() * speed * 0.5 + speed * 0.5);
      vy = (Math.random() - 0.5) * speed;
      break;
    case 2: // bottom
      x = Math.random() * canvas.width;
      y = canvas.height + 10;
      vx = (Math.random() - 0.5) * speed;
      vy = -(Math.random() * speed * 0.5 + speed * 0.5);
      break;
    case 3: // left
      x = -10;
      y = Math.random() * canvas.height;
      vx = Math.random() * speed * 0.5 + speed * 0.5;
      vy = (Math.random() - 0.5) * speed;
      break;
  }

  missiles.push({ x, y, vx, vy, trail: [], airflowTimer: 0 });
}

function updateMissiles() {
  for (let i = missiles.length - 1; i >= 0; i--) {
    const m = missiles[i];
    m.trail.push({ x: m.x, y: m.y });
    if (m.trail.length > 14) m.trail.shift();
    m.x += m.vx;
    m.y += m.vy;

    // Spawn airflow particles
    m.airflowTimer++;
    if (m.airflowTimer % 2 === 0) {
      const angle = Math.atan2(-m.vy, -m.vx);
      const spread = (Math.random() - 0.5) * 1.2;
      const speed = 0.3 + Math.random() * 0.5;
      particles.push({
        x: m.x + (Math.random() - 0.5) * 4,
        y: m.y + (Math.random() - 0.5) * 4,
        vx: Math.cos(angle + spread) * speed,
        vy: Math.sin(angle + spread) * speed,
        life: 15 + Math.random() * 10,
        maxLife: 25,
        size: 1.5 + Math.random() * 2,
        type: 'airflow'
      });
    }

    // Remove if off screen
    if (m.x < -50 || m.x > canvas.width + 50 || m.y < -50 || m.y > canvas.height + 50) {
      missiles.splice(i, 1);
      // Respawn, keeping count within difficulty range
      const range = getMissileCountRange();
      if (missiles.length < range[1]) spawnMissile();
    }
  }
}

function checkMissileCollision() {
  for (let i = missiles.length - 1; i >= 0; i--) {
    const m = missiles[i];
    const mGridX = Math.floor(m.x / GRID_SIZE);
    const mGridY = Math.floor(m.y / GRID_SIZE);

    for (let j = 0; j < snake.length; j++) {
      if (snake[j].x === mGridX && snake[j].y === mGridY) {
        // Hit! Red explosion + sound
        spawnExplosion(m.x, m.y);
        playExplosionSound();
        // Add length
        const tail = snake[snake.length - 1];
        for (let k = 0; k < MISSILE_HIT_GROW; k++) {
          snake.push({ x: tail.x, y: tail.y });
          segmentEffects.push({ index: snake.length - 1, color: 'hit', timer: 30, maxTimer: 30 });
        }
        // Flash the hit segment and neighbors (stronger)
        for (let n = Math.max(0, j - 1); n <= Math.min(snake.length - 1, j + 1); n++) {
          segmentEffects.push({ index: n, color: 'hit', timer: 30, maxTimer: 30 });
        }
        // Remove missile and respawn
        missiles.splice(i, 1);
        const range = getMissileCountRange();
        if (missiles.length < range[1]) spawnMissile();
        break;
      }
    }
  }
}

// ============ PILLS ============
function spawnPills() {
  const pRange = getPillCountRange();
  const count = randInt(pRange[0], pRange[1]);
  const currentPillCount = pills.length;
  const toSpawn = Math.min(count, pRange[1] - currentPillCount);

  for (let i = 0; i < toSpawn; i++) {
    let px, py, attempts = 0;
    do {
      px = randInt(1, cols - 2);
      py = randInt(1, rows - 2);
      attempts++;
    } while (isOccupied(px, py) && attempts < 50);

    if (attempts < 50) {
      pills.push({ x: px, y: py, spawnTime: performance.now(), alpha: 1 });
    }
  }
}

function isOccupied(x, y) {
  for (const s of snake) if (s.x === x && s.y === y) return true;
  for (const p of pills) if (p.x === x && p.y === y) return true;
  return false;
}

function updatePills(timestamp) {
  for (let i = pills.length - 1; i >= 0; i--) {
    const p = pills[i];
    const age = timestamp - p.spawnTime;
    if (age >= PILL_LIFETIME) {
      pills.splice(i, 1);
    } else if (age > PILL_LIFETIME - 1500) {
      // Blink in last 1.5s
      p.alpha = Math.sin(age * 0.015) * 0.5 + 0.5;
    }
  }
}

// ============ SUPER PILL ============
function spawnSuperPill() {
  if (superPill) return;
  let px, py, attempts = 0;
  do {
    px = randInt(2, cols - 3);
    py = randInt(2, rows - 3);
    attempts++;
  } while (isOccupied(px, py) && attempts < 80);

  if (attempts < 80) {
    superPill = { x: px, y: py, spawnTime: performance.now(), alpha: 1 };
    superPillTriggered = true;
  }
}

function updateSuperPill(timestamp) {
  // Reset trigger when length drops below threshold
  // Only when length reaches 30+ again will super pills re-appear
  if (snake.length < SUPER_PILL_LENGTH_TRIGGER) {
    superPillTriggered = false;
  }

  // Trigger: snake exceeds length threshold, no super pill active, cooldown passed
  if (!superPill && !superPillTriggered && snake.length >= SUPER_PILL_LENGTH_TRIGGER) {
    const cooldownOk = !superPillLastTime || (timestamp - superPillLastTime) >= superPillNextCooldown;
    if (cooldownOk) {
      spawnSuperPill();
    }
  }

  if (!superPill) return;

  const age = timestamp - superPill.spawnTime;
  if (age >= SUPER_PILL_LIFETIME) {
    // Expired
    superPill = null;
    superPillTriggered = false; // allow re-trigger if still >= 30
    superPillLastTime = performance.now(); // start cooldown
    superPillNextCooldown = randInt(SUPER_PILL_COOLDOWN_RANGE[0], SUPER_PILL_COOLDOWN_RANGE[1]); // random 8-15s
    return;
  }
  // Blink in last 1.5s
  if (age > SUPER_PILL_LIFETIME - 1500) {
    superPill.alpha = Math.sin(age * 0.02) * 0.5 + 0.5;
  } else {
    superPill.alpha = 1;
  }

  // Check collision with snake head (any of the 4 cells)
  const head = snake[0];
  if ((head.x === superPill.x || head.x === superPill.x + 1) &&
      (head.y === superPill.y || head.y === superPill.y + 1)) {
    activateSuperPill();
  }
}

function activateSuperPill() {
  const px = superPill.x * GRID_SIZE + GRID_SIZE;
  const py = superPill.y * GRID_SIZE + GRID_SIZE;
  superPill = null;
  superPillTriggered = false;
  superPillLastTime = performance.now(); // start cooldown
  superPillNextCooldown = randInt(SUPER_PILL_COOLDOWN_RANGE[0], SUPER_PILL_COOLDOWN_RANGE[1]); // random 8-15s

  // 1. Halve snake length (minimum 3)
  const targetLen = Math.max(3, Math.floor(snake.length / 2));
  const removed = snake.length - targetLen;
  // Flash removed segments blue
  for (let k = 0; k < Math.min(removed, snake.length); k++) {
    const idx = snake.length - 1 - k;
    if (idx >= 0) {
      segmentEffects.push({ index: idx, color: 'blue', timer: 35, maxTimer: 35 });
    }
  }
  snake.splice(targetLen);

  // 2. Explode all missiles
  for (const m of missiles) {
    spawnExplosion(m.x, m.y);
    playExplosionSound();
  }
  missiles = [];
  // Respawn missiles after a short delay
  setTimeout(() => {
    if (gameRunning && !gamePaused) {
      const mRange = getMissileCountRange();
      const mCount = randInt(mRange[0], mRange[1]);
      for (let i = 0; i < mCount; i++) spawnMissile();
    }
  }, 2000);

  // 3. Big golden burst effect
  for (let i = 0; i < 40; i++) {
    const angle = (Math.PI * 2 / 40) * i;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x: px, y: py,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      size: 3 + Math.random() * 3,
      type: 'super',
      hue: 45 + Math.random() * 20 // golden
    });
  }
  // Central golden flash
  particles.push({
    x: px, y: py, vx: 0, vy: 0,
    life: 12, maxLife: 12,
    size: 30, type: 'flash',
    color: 'rgba(255, 215, 0, 0.9)'
  });

  // Score popup
  spawnScorePopup(px, py - 10, 'SUPER!', '#ffd700');

  // Heal sound (celebratory)
  playHealSound();
}

// ============ PARTICLE EFFECTS ============
function spawnExplosion(x, y) {
  const count = 25;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    const speed = 1 + Math.random() * 3;
    const hue = Math.random() > 0.5 ? 0 : 30; // red and orange
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 20 + Math.random() * 15,
      maxLife: 35,
      size: 2 + Math.random() * 3,
      type: 'explosion',
      hue
    });
  }
  // Central flash
  particles.push({
    x, y, vx: 0, vy: 0,
    life: 8, maxLife: 8,
    size: 20, type: 'flash',
    color: 'rgba(255, 200, 50, 0.8)'
  });
}

function spawnHealEffect(x, y) {
  const count = 20;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    const speed = 0.8 + Math.random() * 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.5, // slight upward bias
      life: 25 + Math.random() * 15,
      maxLife: 40,
      size: 2 + Math.random() * 3,
      type: 'heal',
      hue: 200 + Math.random() * 40 // blue range
    });
  }
  // Central blue flash
  particles.push({
    x, y, vx: 0, vy: 0,
    life: 10, maxLife: 10,
    size: 18, type: 'flash',
    color: 'rgba(50, 150, 255, 0.8)'
  });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    // Slow down
    if (p.type === 'explosion' || p.type === 'heal') {
      p.vx *= 0.96;
      p.vy *= 0.96;
    }
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

// ============ DRAWING ============
function draw(timestamp) {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid (subtle)
  ctx.strokeStyle = 'rgba(30, 30, 60, 0.4)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= cols; x++) {
    ctx.beginPath();
    ctx.moveTo(x * GRID_SIZE, 0);
    ctx.lineTo(x * GRID_SIZE, rows * GRID_SIZE);
    ctx.stroke();
  }
  for (let y = 0; y <= rows; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * GRID_SIZE);
    ctx.lineTo(cols * GRID_SIZE, y * GRID_SIZE);
    ctx.stroke();
  }

  // Draw pills
  for (const p of pills) {
    const cx = p.x * GRID_SIZE + GRID_SIZE / 2;
    const cy = p.y * GRID_SIZE + GRID_SIZE / 2;
    const pulse = Math.sin(timestamp * 0.006) * 2;
    const r = GRID_SIZE / 2 - 2 + pulse;

    ctx.save();
    ctx.globalAlpha = p.alpha;

    // Glow
    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2);
    glow.addColorStop(0, 'rgba(0, 255, 200, 0.3)');
    glow.addColorStop(1, 'rgba(0, 255, 200, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(cx - r * 2, cy - r * 2, r * 4, r * 4);

    // Pill body
    ctx.fillStyle = '#00ffc8';
    ctx.shadowColor = '#00ffc8';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.roundRect(p.x * GRID_SIZE + 2, p.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4, 4);
    ctx.fill();

    // Cross symbol
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#0a0a1a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - 3, cy);
    ctx.lineTo(cx + 3, cy);
    ctx.moveTo(cx, cy - 3);
    ctx.lineTo(cx, cy + 3);
    ctx.stroke();

    ctx.restore();
  }

  // Draw super pill (2x2 grid, same cross shape as regular pill but golden and bigger)
  if (superPill) {
    const baseX = superPill.x * GRID_SIZE;
    const baseY = superPill.y * GRID_SIZE;
    const w = GRID_SIZE * 2;
    const h = GRID_SIZE * 2;
    const cx = baseX + w / 2;
    const cy = baseY + h / 2;
    const pulse = Math.sin(timestamp * 0.008) * 3;

    ctx.save();
    ctx.globalAlpha = superPill.alpha;

    // Big glow
    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, w + pulse);
    glow.addColorStop(0, 'rgba(255, 215, 0, 0.4)');
    glow.addColorStop(0.5, 'rgba(255, 180, 0, 0.15)');
    glow.addColorStop(1, 'rgba(255, 215, 0, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(cx - w - pulse, cy - w - pulse, (w + pulse) * 2, (w + pulse) * 2);

    // Pill body (2x2 rounded rect, golden)
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.roundRect(baseX + 2, baseY + 2, w - 4, h - 4, 6);
    ctx.fill();

    // Cross symbol (same as regular pill but bigger)
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#0a0a1a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx - 6, cy);
    ctx.lineTo(cx + 6, cy);
    ctx.moveTo(cx, cy - 6);
    ctx.lineTo(cx, cy + 6);
    ctx.stroke();

    ctx.shadowBlur = 0;

    ctx.restore();
  }

  // Draw missile trails and airflow particles
  for (const p of particles) {
    if (p.type === 'airflow') {
      const alpha = (p.life / p.maxLife) * 0.35;
      ctx.fillStyle = `rgba(255, 120, 50, ${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw missiles
  for (const m of missiles) {
    // Trail with gradient
    for (let t = 0; t < m.trail.length; t++) {
      const progress = t / m.trail.length;
      const alpha = progress * 0.6;
      // Color goes from dark orange to bright red
      const r = 255;
      const g = Math.floor(60 + progress * 80);
      const b = Math.floor(20 + progress * 20);
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
      const tr = 2 + progress * 4;
      ctx.beginPath();
      ctx.arc(m.trail[t].x, m.trail[t].y, tr, 0, Math.PI * 2);
      ctx.fill();
    }

    // Missile glow
    const missileGlow = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, 14);
    missileGlow.addColorStop(0, 'rgba(255, 80, 30, 0.3)');
    missileGlow.addColorStop(1, 'rgba(255, 80, 30, 0)');
    ctx.fillStyle = missileGlow;
    ctx.fillRect(m.x - 14, m.y - 14, 28, 28);

    // Missile body
    ctx.fillStyle = '#ff3333';
    ctx.shadowColor = '#ff4400';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(m.x, m.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Missile core highlight
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath();
    ctx.arc(m.x, m.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw snake
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];

    // Check for segment effects
    const effect = segmentEffects.find(e => e.index === i);
    let fillColor;
    let glowColor = null;
    let glowSize = 0;
    if (effect) {
      const t = effect.timer / (effect.maxTimer || 30);
      const flashPhase = Math.sin(effect.timer * 1.2) * 0.5 + 0.5;
      const intensity = t; // stronger at start, fades out
      if (effect.color === 'hit') {
        // Red flash for missile hit - very bright with white peaks
        const l = 50 + flashPhase * 45 * intensity;
        fillColor = `hsl(${flashPhase * 20}, 100%, ${l}%)`;
        glowColor = `rgba(255, 50, 20, ${0.6 * intensity})`;
        glowSize = 10 + flashPhase * 6;
      } else if (effect.color === 'blue') {
        // Blue flash for pill shrink - bright blue with white peaks
        const l = 50 + flashPhase * 45 * intensity;
        fillColor = `hsl(${200 + flashPhase * 20}, 100%, ${l}%)`;
        glowColor = `rgba(30, 150, 255, ${0.6 * intensity})`;
        glowSize = 10 + flashPhase * 6;
      } else if (effect.color === 'grow') {
        // Yellow-green flash for auto grow
        const l = 50 + flashPhase * 40 * intensity;
        fillColor = `hsl(${60 + flashPhase * 60}, 100%, ${l}%)`;
        glowColor = `rgba(200, 255, 0, ${0.5 * intensity})`;
        glowSize = 8 + flashPhase * 5;
      }
    } else {
      // Head is bright cyan-white, body is solid neon green
      fillColor = i === 0 ? '#aaffee' : '#00dd66';
    }

    ctx.fillStyle = fillColor;

    // Segment glow effect
    if (glowColor) {
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = glowSize;
    } else if (i === 0) {
      ctx.shadowColor = '#00ffee';
      ctx.shadowBlur = 14;
    }

    const padding = i === 0 ? 0 : 2;
    const gs = GRID_SIZE;
    const cx = s.x * gs + gs / 2;
    const cy = s.y * gs + gs / 2;

    if (i === 0) {
      // Snake head: square, slightly wider than body
      const shrink = effect ? 0 : 1;
      ctx.beginPath();
      ctx.roundRect(
        s.x * gs - 1 - shrink,
        s.y * gs - 1 - shrink,
        gs + 2 + shrink * 2,
        gs + 2 + shrink * 2,
        4
      );
      ctx.fill();
    } else {
      // Body segments: rounded rectangle
      const shrink = effect ? 0 : 1;
      ctx.beginPath();
      ctx.roundRect(
        s.x * gs + padding - shrink,
        s.y * gs + padding - shrink,
        gs - (padding - shrink) * 2,
        gs - (padding - shrink) * 2,
        3
      );
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Eyes on head
    if (i === 0) {
      ctx.fillStyle = '#ff2222';
      const ed = gs * 0.22;
      let ex1, ey1, ex2, ey2;
      if (direction === DIRECTIONS.RIGHT) {
        ex1 = cx + gs * 0.15; ey1 = cy - ed; ex2 = cx + gs * 0.15; ey2 = cy + ed;
      } else if (direction === DIRECTIONS.LEFT) {
        ex1 = cx - gs * 0.15; ey1 = cy - ed; ex2 = cx - gs * 0.15; ey2 = cy + ed;
      } else if (direction === DIRECTIONS.UP) {
        ex1 = cx - ed; ey1 = cy - gs * 0.15; ex2 = cx + ed; ey2 = cy - gs * 0.15;
      } else {
        ex1 = cx - ed; ey1 = cy + gs * 0.15; ex2 = cx + ed; ey2 = cy + gs * 0.15;
      }
      ctx.beginPath();
      ctx.arc(ex1, ey1, 2, 0, Math.PI * 2);
      ctx.arc(ex2, ey2, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw particles (on top of snake)
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);

    if (p.type === 'explosion') {
      // Red/orange explosion particles
      ctx.fillStyle = `hsla(${p.hue}, 100%, 55%, ${alpha})`;
      ctx.shadowColor = `hsla(${p.hue}, 100%, 55%, ${alpha * 0.5})`;
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else if (p.type === 'super') {
      // Golden super pill particles
      ctx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${alpha})`;
      ctx.shadowColor = `hsla(${p.hue}, 100%, 60%, ${alpha * 0.6})`;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else if (p.type === 'heal') {
      // Blue healing particles
      ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${alpha})`;
      ctx.shadowColor = `hsla(${p.hue}, 100%, 65%, ${alpha * 0.5})`;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else if (p.type === 'flash') {
      // Central flash (explosion or heal)
      ctx.save();
      ctx.globalAlpha = alpha;
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * alpha);
      grad.addColorStop(0, p.color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
      ctx.restore();
    }
    // airflow particles are drawn before missiles, skip here
  }

  // Draw score popups (on top of everything)
  for (const sp of scorePopups) {
    const alpha = Math.max(0, sp.timer / sp.maxTimer);
    const scale = 0.8 + alpha * 0.4; // start large, shrink
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = sp.color;
    ctx.font = `bold ${Math.round(16 * scale)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.shadowColor = sp.color;
    ctx.shadowBlur = 8;
    ctx.fillText(sp.text, sp.x, sp.y);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ============ HUD ============
function updateHUD() {
  document.getElementById('hudScore').textContent = `得分: ${score}`;
  document.getElementById('hudLength').textContent = `长度: ${snake.length}`;
  document.getElementById('hudTime').textContent = `${survivalTime}s`;
  document.getElementById('hudDifficulty').textContent = `Lv${difficultyLevel}`;
}

// ============ GAME OVER ============
function gameOver() {
  gameRunning = false;
  if (animFrameId) cancelAnimationFrame(animFrameId);
  stopBgMusic();

  document.getElementById('hud').classList.add('hidden');
  document.getElementById('pauseBtn').classList.add('hidden');

  // Save score
  saveScore(score);

  document.getElementById('finalScore').textContent = score;
  document.getElementById('deathReason').textContent = deathReason;
  document.getElementById('gameOverScreen').classList.remove('hidden');

  renderLeaderboards();
}

// ============ PAUSE ============
function togglePause() {
  gamePaused = !gamePaused;
  document.getElementById('pauseBtn').textContent = gamePaused ? '继续' : '暂停';
  if (!gamePaused) {
    lastMoveTime = performance.now();
    lastAutoGrowTime = performance.now();
    lastSurvivalScoreTime = performance.now();
  }
}

// ============ LEADERBOARD (localStorage) ============
function getWeekKey(date) {
  const d = new Date(date);
  const start = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${week}`;
}

function getScores() {
  try {
    return JSON.parse(localStorage.getItem('snakeScores') || '[]');
  } catch { return []; }
}

function saveScore(score) {
  const scores = getScores();
  scores.push({ score, date: Date.now(), week: getWeekKey(new Date()) });
  localStorage.setItem('snakeScores', JSON.stringify(scores));
  saveWeeklyChampion(score);
}

function getCurrentWeekScores() {
  const currentWeek = getWeekKey(new Date());
  return getScores().filter(s => s.week === currentWeek).sort((a, b) => b.score - a.score);
}

function getAllTimeScores() {
  return getScores().sort((a, b) => b.score - a.score).slice(0, 10);
}

function saveWeeklyChampion(score) {
  const champions = getWeeklyChampions();
  const currentWeek = getWeekKey(new Date());
  const existing = champions.find(c => c.week === currentWeek);
  if (existing) {
    if (score > existing.champion) {
      existing.runnerUp = existing.champion;
      existing.champion = score;
    } else if (score > existing.runnerUp) {
      existing.runnerUp = score;
    }
  } else {
    champions.push({ week: currentWeek, champion: score, runnerUp: 0 });
  }
  // Keep only last 12 weeks
  while (champions.length > 12) champions.shift();
  localStorage.setItem('snakeWeeklyChampions', JSON.stringify(champions));
}

function getWeeklyChampions() {
  try {
    return JSON.parse(localStorage.getItem('snakeWeeklyChampions') || '[]');
  } catch { return []; }
}

function renderLeaderboardHTML(scores) {
  if (scores.length === 0) return '<p style="text-align:center;color:#555;font-size:0.8em;">暂无记录</p>';
  let html = '<table><tr><th>#</th><th>得分</th><th>时间</th></tr>';
  scores.slice(0, 10).forEach((s, i) => {
    const rankClass = i < 3 ? `rank-${i + 1}` : '';
    const date = new Date(s.date);
    const timeStr = `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
    html += `<tr class="${rankClass}"><td>${i + 1}</td><td>${s.score}</td><td>${timeStr}</td></tr>`;
  });
  html += '</table>';
  return html;
}

function renderWeeklyChampionsHTML() {
  const champions = getWeeklyChampions();
  if (champions.length === 0) return '';
  let html = '';
  champions.slice(-4).reverse().forEach(c => {
    html += `<p>🏆 ${c.week}: 冠军 ${c.champion} | 亚军 ${c.runnerUp || '-'}</p>`;
  });
  return html;
}

function renderLeaderboards() {
  const weekScores = getCurrentWeekScores();
  const allScores = getAllTimeScores();
  const championsHTML = renderWeeklyChampionsHTML();

  const lbHTML = `<h3>本周排行</h3>${renderLeaderboardHTML(weekScores)}`;

  document.getElementById('startLeaderboard').innerHTML = lbHTML;
  document.getElementById('endLeaderboard').innerHTML = lbHTML;
  document.getElementById('startWeeklyChampions').innerHTML = championsHTML ? `<h3>历届冠军</h3>${championsHTML}` : '';
  document.getElementById('endWeeklyChampions').innerHTML = championsHTML ? `<h3>历届冠军</h3>${championsHTML}` : '';
}

// ============ UTILS ============
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// 难度缩放辅助函数
function getMissileCountRange() {
  const bonus = Math.floor((difficultyLevel - 1) / 2);
  return [MISSILE_COUNT_RANGE[0] + bonus, MISSILE_COUNT_RANGE[1] + bonus];
}

function getMissileSpeed() {
  return MISSILE_SPEED * (1 + (difficultyLevel - 1) * 0.08);
}

function getPillCountRange() {
  const bonus = Math.floor((difficultyLevel - 1) / 2);
  return [PILL_COUNT_RANGE[0] + bonus, PILL_COUNT_RANGE[1] + bonus];
}

init();
